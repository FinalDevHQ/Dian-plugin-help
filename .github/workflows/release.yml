name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 拉取主仓库（提供 packages/plugin-runtime 等本地依赖）
      - name: Checkout Dian monorepo
        uses: actions/checkout@v4
        with:
          repository: FinalDevHQ/Dian
          path: dian

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            dian/package-lock.json
            plugin/package-lock.json

      # 2. 在 monorepo 根安装全部依赖（含原生模块）
      - name: Install dependencies
        working-directory: dian
        run: npm ci

      # 3. 构建 packages（plugin-runtime 等本地依赖需要先编译出 dist）
      - name: Build packages
        working-directory: dian
        run: npm run build -w packages

      # 4. 拉取当前插件仓库到独立目录
      - name: Checkout plugin repository
        uses: actions/checkout@v4
        with:
          path: plugin

      # 5. 同步插件代码到 monorepo 的 plugin-template
      - name: Sync plugin files into monorepo
        run: |
          rm -rf dian/plugin-template
          mkdir -p dian/plugin-template
          rsync -a --delete --exclude ".git" plugin/ dian/plugin-template/

      # 6. 安装当前插件依赖（使用本仓库自己的 lockfile）
      - name: Install plugin dependencies
        working-directory: dian/plugin-template
        run: npm ci

      # 7. 打包插件
      - name: Pack plugin
        working-directory: dian/plugin-template
        run: npm run pack

      # 8. 读取 zip 文件名（来自 package.json name 字段）
      - name: Resolve zip filename
        id: meta
        working-directory: dian/plugin-template
        run: |
          NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")
          echo "zip=${NAME}.zip" >> "$GITHUB_OUTPUT"

      # 9. 创建 GitHub Release 并上传 zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dian/plugin-template/${{ steps.meta.outputs.zip }}
          generate_release_notes: true
